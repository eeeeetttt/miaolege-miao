<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>野外篝火</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #040814;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
<canvas id="campfireCanvas"></canvas>
<script>
(function() {
    const canvas = document.getElementById('campfireCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    const W = () => canvas.width;
    const H = () => canvas.height;
    const fireBaseX = () => canvas.width / 2;
    const fireBaseY = () => canvas.height - 60;

    // 火星粒子
    class Spark {
        constructor(x, y, vx, vy, size, color, life, maxLife) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.size = size; this.color = color;
            this.life = life; this.maxLife = maxLife; this.alpha = 1.0;
        }
        update(gravity, airResistance) {
            this.vx *= airResistance;
            this.vy = this.vy * airResistance + gravity;
            this.x += this.vx; this.y += this.vy;
            this.life -= 1;
            const lifePercent = this.life / this.maxLife;
            this.alpha = Math.min(1.0, lifePercent * 1.2);
            return this.life > 0 && this.y < H() + 50 && this.x > -50 && this.x < W() + 50;
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.alpha * 0.9;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 8;
            ctx.shadowColor = "orange";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x - 0.5, this.y - 0.5, this.size * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = "#ffee99";
            ctx.fill();
            ctx.restore();
        }
    }

    let sparks = [];
    const MAX_SPARKS = 80;
    const GRAVITY = 0.15;
    const AIR_DRAG = 0.985;

    function addSparkFromFire(flameTopX, flameTopY) {
        if (sparks.length > MAX_SPARKS + 20) return;
        const angleVariation = (Math.random() - 0.5) * 1.4;
        const baseAngle = -Math.PI / 2 + angleVariation;
        const speed = 1.5 + Math.random() * 3;
        const vx = Math.cos(baseAngle) * speed * (Math.random() * 0.8 + 0.5);
        const vy = Math.sin(baseAngle) * speed * (0.7 + Math.random() * 1.3);
        const size = 2 + Math.random() * 4;
        const colorChoice = Math.random();
        let color;
        if (colorChoice < 0.5) color = `rgba(255, ${70 + Math.random() * 70}, 20, 1)`;
        else if (colorChoice < 0.85) color = `rgba(255, 180, 40, 1)`;
        else color = `rgba(255, 230, 120, 1)`;
        const maxLife = 45 + Math.floor(Math.random() * 65);
        sparks.push(new Spark(flameTopX + (Math.random() - 0.5) * 50, flameTopY, vx, vy, size, color, maxLife, maxLife));
    }

    // 星星 - 更明显的闪烁
    class Star {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * W();
            this.y = Math.random() * (H() * 0.6);
            this.size = Math.random() * 2.5 + 0.8;
            this.baseAlpha = Math.random() * 0.6 + 0.4;
            this.alpha = this.baseAlpha;
            this.twinkleSpeed = 0.04 + Math.random() * 0.06; // 更快的闪烁
            this.phase = Math.random() * Math.PI * 2;
            this.twinkleIntensity = 0.5 + Math.random() * 0.5; // 更强的闪烁
        }
        update() {
            this.phase += this.twinkleSpeed;
            // 更明显的闪烁效果
            this.alpha = this.baseAlpha * (this.twinkleIntensity + (1 - this.twinkleIntensity) * Math.sin(this.phase));
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = this.size * 3;
            ctx.shadowColor = "#88ccff";
            ctx.fill();
            ctx.restore();
        }
    }

    let stars = [];
    const initStars = () => {
        stars = [];
        for (let i = 0; i < 150; i++) stars.push(new Star());
    };
    initStars();
    window.addEventListener('resize', initStars);

    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, H());
        grad.addColorStop(0, "#020408");
        grad.addColorStop(0.4, "#040a14");
        grad.addColorStop(0.7, "#081020");
        grad.addColorStop(1, "#0d1828");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W(), H());
        stars.forEach(s => { s.update(); s.draw(ctx); });
    }

    function drawGround() {
        const groundGrad = ctx.createLinearGradient(0, fireBaseY() - 10, 0, H());
        groundGrad.addColorStop(0, "#3a2510");
        groundGrad.addColorStop(0.3, "#251808");
        groundGrad.addColorStop(1, "#100c05");
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, fireBaseY() - 5, W(), H() - fireBaseY() + 5);
        // 石头
        for (let i = 0; i < 15; i++) {
            const sx = fireBaseX() + (Math.random() - 0.5) * 250;
            const sy = fireBaseY() + 8 + Math.random() * 30;
            const sr = 6 + Math.random() * 25;
            ctx.beginPath();
            ctx.ellipse(sx, sy, sr, sr * 0.3, 0, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(25, 18, 10, 0.7)";
            ctx.fill();
        }
    }

    function drawWoodLogs() {
        const scale = Math.min(W() / 1200, H() / 700);
        const logs = [
            { x: fireBaseX() - 60 * scale, y: fireBaseY() - 28, angle: -0.4, length: 120 * scale, radius: 12 * scale },
            { x: fireBaseX() + 60 * scale, y: fireBaseY() - 28, angle: 0.4, length: 120 * scale, radius: 12 * scale },
            { x: fireBaseX() - 35 * scale, y: fireBaseY() - 20, angle: 0.2, length: 100 * scale, radius: 10 * scale },
            { x: fireBaseX() + 35 * scale, y: fireBaseY() - 20, angle: -0.2, length: 100 * scale, radius: 10 * scale },
            { x: fireBaseX(), y: fireBaseY() - 14, angle: 0, length: 85 * scale, radius: 9 * scale },
        ];
        logs.forEach(log => {
            ctx.save();
            ctx.translate(log.x, log.y);
            ctx.rotate(log.angle);
            const lg = ctx.createLinearGradient(0, -log.radius, 0, log.radius);
            lg.addColorStop(0, "#5a3820");
            lg.addColorStop(0.5, "#3d2515");
            lg.addColorStop(1, "#251508");
            ctx.beginPath();
            ctx.roundRect(-log.length / 2, -log.radius, log.length, log.radius * 2, log.radius);
            ctx.fillStyle = lg;
            ctx.fill();
            // 木纹
            for (let i = 0; i < 5; i++) {
                const ringX = -log.length / 2 + (i + 1) * (log.length / 6);
                ctx.beginPath();
                ctx.arc(ringX, 0, log.radius * 0.85, -Math.PI * 0.5, Math.PI * 0.5);
                ctx.strokeStyle = "rgba(90, 55, 30, 0.5)";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            ctx.restore();
        });
    }

    let time = 0;
    let isWindMode = false;
    let windIntensity = 0;
    let targetWindIntensity = 0;

    canvas.addEventListener('click', () => {
        isWindMode = !isWindMode;
        if (!isWindMode) targetWindIntensity = 0;
    });

    function drawFire() {
        const scale = Math.min(W() / 1200, H() / 700);
        const flameCount = 100; // 更多火焰粒子
        for (let i = 0; i < flameCount; i++) {
            const t = i / flameCount;
            // 更自然的摇曳
            const sway1 = Math.sin(time * 2.8 + t * Math.PI * 8) * (40 + t * 20);
            const sway2 = Math.sin(time * 4.5 + t * Math.PI * 6 + 1.5) * (25 + t * 15);
            const sway3 = Math.cos(time * 3.2 + t * Math.PI * 10) * (15 + t * 10);
            const totalSway = sway1 + sway2 + sway3;
            
            const x = fireBaseX() + totalSway * (isWindMode ? (1 + windIntensity * 0.4) : 1);
            const baseY = fireBaseY() - 5;
            const flameHeight = (200 + Math.sin(time * 3.5 + t * 12) * 30) * scale * (1 - t * 0.55);
            const y = baseY - t * flameHeight;
            const windOffset = isWindMode ? windIntensity * 60 * t : 0;
            const adjustedX = x + windOffset;
            
            // 更丰富的颜色渐变
            const r = Math.floor(255 - t * 80);
            const g = Math.floor(Math.max(0, 80 - t * 200 + Math.sin(time * 10 + t * 18) * 50));
            const b = Math.floor(Math.max(0, 15 - t * 70));
            const alpha = Math.max(0, 0.95 - t * 0.85);
            const size = (10 - t * 7) * scale * (1.1 + Math.sin(time * 6 + t * 10) * 0.2);
            
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(adjustedX, y, Math.max(1.5, size), 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(adjustedX, y, 0, adjustedX, y, size);
            grad.addColorStop(0, `rgba(255, 255, 220, 0.95)`);
            grad.addColorStop(0.25, `rgba(${r}, ${Math.floor(g * 1.2)}, ${Math.floor(b * 0.5)}, 0.85)`);
            grad.addColorStop(0.6, `rgba(${r}, ${g}, ${b}, 0.7)`);
            grad.addColorStop(1, `rgba(${Math.floor(r * 0.4)}, ${Math.floor(g * 0.2)}, 0, 0)`);
            ctx.fillStyle = grad;
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgba(255, 120, 0, 0.7)";
            ctx.fill();
            ctx.restore();
            
            // 从火焰顶部喷射火星
            if (i < 5 && Math.random() < 0.12) {
                const flameTopX = adjustedX;
                const flameTopY = y - size * 0.8;
                addSparkFromFire(flameTopX, flameTopY);
            }
        }
    }

    function drawGlow() {
        const scale = Math.min(W() / 1200, H() / 700);
        const glowGrad = ctx.createRadialGradient(
            fireBaseX(), fireBaseY() - 100 * scale, 0,
            fireBaseX(), fireBaseY() - 100 * scale, 250 * scale
        );
        glowGrad.addColorStop(0, "rgba(255, 140, 40, 0.35)");
        glowGrad.addColorStop(0.4, "rgba(255, 70, 0, 0.15)");
        glowGrad.addColorStop(0.7, "rgba(255, 30, 0, 0.05)");
        glowGrad.addColorStop(1, "rgba(255, 10, 0, 0)");
        ctx.fillStyle = glowGrad;
        ctx.fillRect(fireBaseX() - 280 * scale, fireBaseY() - 320 * scale, 560 * scale, 340 * scale);
    }

    function drawEmbers() {
        const scale = Math.min(W() / 1200, H() / 700);
        for (let i = 0; i < 30; i++) {
            const ex = fireBaseX() + (Math.random() - 0.5) * 140 * scale;
            const ey = fireBaseY() - 15 + Math.sin(time * 2 + i * 0.5) * 8;
            const es = 2 + Math.random() * 4;
            const flicker = 0.5 + Math.sin(time * 8 + i * 2) * 0.5;
            ctx.save();
            ctx.globalAlpha = flicker * 0.8;
            ctx.beginPath();
            ctx.arc(ex, ey, es * scale, 0, Math.PI * 2);
            ctx.fillStyle = "#ff6622";
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#ff4400";
            ctx.fill();
            ctx.restore();
        }
    }

    function drawSparks() {
        sparks = sparks.filter(s => s.update(GRAVITY, AIR_DRAG));
        sparks.forEach(s => s.draw(ctx));
    }

    function animate() {
        time += 0.016;
        
        // 风模式过渡
        if (isWindMode && windIntensity < 1) {
            windIntensity += 0.02;
        } else if (!isWindMode && windIntensity > 0) {
            windIntensity -= 0.02;
        }
        windIntensity = Math.max(0, Math.min(1, windIntensity));

        drawBackground();
        drawGlow();
        drawGround();
        drawWoodLogs();
        drawEmbers();
        drawFire();
        drawSparks();

        requestAnimationFrame(animate);
    }

    animate();
})();
</script>
</body>
</html>
