<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>野外篝火 - 动态火焰效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
        }

        .container {
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 140, 0, 0.2) inset;
            background: #00000022;
            padding: 8px;
        }

        canvas {
            display: block;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(255, 80, 0, 0.3);
            cursor: pointer;
            transition: filter 0.3s ease;
        }

        canvas:hover {
            filter: drop-shadow(0 0 12px #ff7b2c);
        }

        .info {
            text-align: center;
            margin-top: 18px;
            color: #ffdd99;
            font-size: 14px;
            background: #1e1a2fb3;
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 60px;
            display: inline-block;
            width: auto;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .info i {
            font-style: normal;
            display: inline-block;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; text-shadow: 0 0 0px #ff9f4a; }
            100% { opacity: 1; text-shadow: 0 0 6px #ff6600; }
        }

        footer {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: #7a6a5a;
        }
    </style>
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center;">
    <div class="container">
        <canvas id="campfireCanvas" width="1100" height="650" style="width: 1100px; height: 650px;"></canvas>
    </div>
    <div class="info">
        <i>🔥</i> 野外篝火 | 摇曳火焰 · 飞舞火星 · 星空闪烁 <i>🔥</i>
    </div>
    <footer>~ 动态粒子火焰 | 每帧燃烧的温暖 ~</footer>
</div>

<script>
(function() {
    const canvas = document.getElementById('campfireCanvas');
    const ctx = canvas.getContext('2d');
    const W = 1100;
    const H = 650;
    canvas.width = W;
    canvas.height = H;
    const fireBaseX = W / 2;
    const fireBaseY = H - 65;

    class Spark {
        constructor(x, y, vx, vy, size, color, life, maxLife) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.size = size; this.color = color;
            this.life = life; this.maxLife = maxLife; this.alpha = 1.0;
        }
        update(gravity, airResistance) {
            this.vx *= airResistance;
            this.vy = this.vy * airResistance + gravity;
            this.x += this.vx; this.y += this.vy;
            this.life -= 1;
            const lifePercent = this.life / this.maxLife;
            this.alpha = Math.min(1.0, lifePercent * 1.2);
            return this.life > 0 && this.y < H + 50 && this.x > -50 && this.x < W + 50;
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.alpha * 0.9;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 8;
            ctx.shadowColor = "orange";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x - 0.8, this.y - 0.8, this.size * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = "#ffdd88";
            ctx.fill();
            ctx.restore();
        }
    }

    let sparks = [];
    const MAX_SPARKS = 65;
    const GRAVITY = 0.12;
    const AIR_DRAG = 0.99;

    function addSparkFromFire(flameTopX, flameTopY) {
        if (sparks.length > MAX_SPARKS + 15) return;
        const angleVariation = (Math.random() - 0.5) * 1.2;
        const baseAngle = -Math.PI / 2 + angleVariation;
        const speed = 1.2 + Math.random() * 2.6;
        const vx = Math.cos(baseAngle) * speed * (Math.random() * 0.8 + 0.6);
        const vy = Math.sin(baseAngle) * speed * (0.8 + Math.random() * 1.2);
        const size = 1.8 + Math.random() * 3.5;
        const colorChoice = Math.random();
        let color;
        if (colorChoice < 0.6) color = `rgba(255, ${80 + Math.random() * 60}, 20, 1)`;
        else if (colorChoice < 0.9) color = `rgba(255, 180, 40, 1)`;
        else color = `rgba(255, 220, 100, 1)`;
        const maxLife = 38 + Math.floor(Math.random() * 55);
        sparks.push(new Spark(flameTopX + (Math.random() - 0.5) * 40, flameTopY, vx, vy, size, color, maxLife, maxLife));
    }

    class Star {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * W; this.y = Math.random() * (H * 0.55);
            this.size = Math.random() * 1.8 + 0.6;
            this.baseAlpha = Math.random() * 0.5 + 0.3;
            this.alpha = this.baseAlpha;
            this.twinkleSpeed = 0.015 + Math.random() * 0.025;
            this.phase = Math.random() * Math.PI * 2;
        }
        update() {
            this.phase += this.twinkleSpeed;
            this.alpha = this.baseAlpha * (0.6 + 0.4 * Math.sin(this.phase));
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 3;
            ctx.shadowColor = "#aaddff";
            ctx.fill();
            ctx.restore();
        }
    }

    let stars = [];
    for (let i = 0; i < 100; i++) stars.push(new Star());

    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#040814");
        grad.addColorStop(0.5, "#0a1120");
        grad.addColorStop(1, "#0d1a2d");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        stars.forEach(s => { s.update(); s.draw(ctx); });
    }

    function drawGround() {
        const groundGrad = ctx.createLinearGradient(0, fireBaseY - 10, 0, H);
        groundGrad.addColorStop(0, "#2a1a0a");
        groundGrad.addColorStop(0.3, "#1e1208");
        groundGrad.addColorStop(1, "#0f0a04");
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, fireBaseY - 5, W, H - fireBaseY + 5);
        for (let i = 0; i < 12; i++) {
            const sx = fireBaseX + (Math.random() - 0.5) * 180;
            const sy = fireBaseY + 5 + Math.random() * 25;
            const sr = 8 + Math.random() * 20;
            ctx.beginPath();
            ctx.ellipse(sx, sy, sr, sr * 0.25, 0, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(20, 12, 5, 0.6)";
            ctx.fill();
        }
    }

    function drawWoodLogs() {
        const logs = [
            { x: fireBaseX - 55, y: fireBaseY - 25, angle: -0.35, length: 110, radius: 11 },
            { x: fireBaseX + 55, y: fireBaseY - 25, angle: 0.35, length: 110, radius: 11 },
            { x: fireBaseX - 30, y: fireBaseY - 18, angle: 0.15, length: 95, radius: 9 },
            { x: fireBaseX + 30, y: fireBaseY - 18, angle: -0.15, length: 95, radius: 9 },
            { x: fireBaseX, y: fireBaseY - 12, angle: 0, length: 80, radius: 8 },
        ];
        logs.forEach(log => {
            ctx.save();
            ctx.translate(log.x, log.y);
            ctx.rotate(log.angle);
            const lg = ctx.createLinearGradient(0, -log.radius, 0, log.radius);
            lg.addColorStop(0, "#4a3020");
            lg.addColorStop(0.5, "#2d1a0f");
            lg.addColorStop(1, "#1a0f08");
            ctx.beginPath();
            ctx.roundRect(-log.length / 2, -log.radius, log.length, log.radius * 2, log.radius);
            ctx.fillStyle = lg;
            ctx.fill();
            for (let i = 0; i < 5; i++) {
                const ringX = -log.length / 2 + (i + 1) * (log.length / 6);
                ctx.beginPath();
                ctx.arc(ringX, 0, log.radius * 0.9, -Math.PI * 0.5, Math.PI * 0.5);
                ctx.strokeStyle = "rgba(80, 50, 25, 0.5)";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            ctx.restore();
        });
    }

    let time = 0;
    let isWindMode = false;
    let windIntensity = 0;

    canvas.addEventListener('click', () => {
        isWindMode = !isWindMode;
        if (!isWindMode) windIntensity = 0;
    });

    function drawFire() {
        const flameCount = 80;
        for (let i = 0; i < flameCount; i++) {
            const t = i / flameCount;
            const x = fireBaseX + Math.sin(t * Math.PI * 6 + time * 2.5) * (35 + t * 15) * (isWindMode ? (1 + windIntensity * 0.3) : 1);
            const baseY = fireBaseY - 5;
            const flameHeight = (180 + Math.sin(time * 3 + t * 10) * 20) * (1 - t * 0.6);
            const y = baseY - t * flameHeight;
            const windOffset = isWindMode ? windIntensity * 50 * t : 0;
            const adjustedX = x + windOffset;
            const r = Math.floor(255 - t * 100);
            const g = Math.floor(Math.max(0, 60 - t * 180 + Math.sin(time * 8 + t * 15) * 40));
            const b = Math.floor(Math.max(0, 10 - t * 60));
            const alpha = Math.max(0, 0.9 - t * 0.8);
            const size = (8 - t * 6) * (1 + Math.sin(time * 5 + t * 8) * 0.15);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(adjustedX, y, Math.max(1, size), 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(adjustedX, y, 0, adjustedX, y, size);
            grad.addColorStop(0, `rgba(255, 255, 200, 0.9)`);
            grad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, 0.8)`);
            grad.addColorStop(1, `rgba(${Math.floor(r * 0.5)}, ${Math.floor(g * 0.3)}, 0, 0)`);
            ctx.fillStyle = grad;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(255, 100, 0, 0.6)";
            ctx.fill();
            ctx.restore();
            if (i < 4 && Math.random() < 0.08) {
                const flameTopX = adjustedX;
                const flameTopY = y - size;
                addSparkFromFire(flameTopX, flameTopY);
            }
        }
    }

    function drawGlow() {
        const glowGrad = ctx.createRadialGradient(fireBaseX, fireBaseY - 80, 0, fireBaseX, fireBaseY - 80, 200);
        glowGrad.addColorStop(0, "rgba(255, 120, 30, 0.3)");
        glowGrad.addColorStop(0.5, "rgba(255, 60, 0, 0.1)");
        glowGrad.addColorStop(1, "rgba(255, 30, 0, 0)");
        ctx.fillStyle = glowGrad;
        ctx.fillRect(fireBaseX - 200, fireBaseY - 280, 400, 280);
    }

    function drawEmbers() {
        for (let i = 0; i < 25; i++) {
            const ex = fireBaseX + (Math.random() - 0.5) * 120;
            const ey = fireBaseY - Math.random() * 30;
            const er = 1 + Math.random() * 2;
            const flicker = 0.5 + Math.random() * 0.5;
            ctx.save();
            ctx.globalAlpha = flicker * 0.7;
            ctx.beginPath();
            ctx.arc(ex, ey, er, 0, Math.PI * 2);
            ctx.fillStyle = Math.random() < 0.7 ? "#ff6020" : "#ff9940";
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#ff4400";
            ctx.fill();
            ctx.restore();
        }
    }

    function updateSparks() {
        sparks = sparks.filter(spark => spark.update(GRAVITY, AIR_DRAG));
    }

    function drawSparks() {
        sparks.forEach(spark => spark.draw(ctx));
    }

    function animate() {
        time += 0.016;
        if (isWindMode) windIntensity = Math.min(1.5, windIntensity + 0.02);
        drawBackground();
        drawGround();
        drawGlow();
        drawEmbers();
        drawWoodLogs();
        drawFire();
        updateSparks();
        drawSparks();
        requestAnimationFrame(animate);
    }

    animate();
})();
</script>
</body>
</html>
